name: Website to PDF Archive

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'آدرس سایت (مثال: https://example.com)'
        required: true
        type: string
      depth:
        description: 'عمق دنبال کردن لینک‌ها (1 = فقط صفحه اصلی)'
        required: false
        type: choice
        options:
          - '1'
          - '2'
          - '3'
        default: '2'
      filename:
        description: 'نام فایل PDF خروجی'
        required: false
        type: string
        default: 'web-archive'

jobs:
  archive-to-pdf:
    name: Archive Website as PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            chromium-browser \
            fonts-liberation \
            fonts-noto-color-emoji \
            fonts-ipafont-gothic \
            fonts-wqy-zenhei \
            fonts-thai-tlwg \
            fonts-kacst \
            fonts-freefont-ttf \
            --no-install-recommends 2>/dev/null || true

      - name: Install npm packages
        run: |
          npm init -y
          npm install puppeteer pdf-lib

      - name: Find Chromium Path
        id: chromium
        run: |
          CHROMIUM_PATH=$(which chromium-browser || which chromium || which google-chrome || echo "/usr/bin/chromium-browser")
          echo "path=$CHROMIUM_PATH" >> $GITHUB_OUTPUT
          echo "✓ Chromium found at: $CHROMIUM_PATH"

      - name: Archive Website to PDF
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          DEPTH: ${{ github.event.inputs.depth }}
          OUTPUT_FILE: ${{ github.event.inputs.filename }}.pdf
          CHROMIUM_PATH: ${{ steps.chromium.outputs.path }}
        run: |
          cat > archive.js << 'SCRIPT_END'
          const puppeteer = require('puppeteer');
          const { PDFDocument } = require('pdf-lib');
          const fs = require('fs');
          const path = require('path');

          const TARGET_URL = process.env.TARGET_URL;
          const MAX_DEPTH = parseInt(process.env.DEPTH || '2');
          const OUTPUT_FILE = process.env.OUTPUT_FILE || 'web-archive.pdf';
          const CHROMIUM_PATH = process.env.CHROMIUM_PATH || '/usr/bin/chromium-browser';

          // اعتبارسنجی URL
          let BASE_DOMAIN;
          try {
            const parsedUrl = new URL(TARGET_URL);
            BASE_DOMAIN = parsedUrl.hostname;
            if (!parsedUrl.protocol.startsWith('http')) {
              throw new Error('پروتکل نامعتبر');
            }
          } catch(e) {
            console.error('❌ آدرس وارد شده معتبر نیست');
            console.error(e.message);
            process.exit(1);
          }

          const visited = new Set();
          const pagesToVisit = [{ url: TARGET_URL, depth: 0 }];
          const pdfBuffers = [];
          const MAX_PAGES = 30; // محدودیت معقول

          function normalizeUrl(url, base) {
            try {
              const absolute = new URL(url, base);
              // فقط صفحات همون دامنه
              if (absolute.hostname !== BASE_DOMAIN) return null;
              // حذف hash و پارامترهای تکراری
              absolute.hash = '';
              // حذف پارامترهای tracking معمول
              const trackingParams = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'fbclid', 'gclid'];
              trackingParams.forEach(p => absolute.searchParams.delete(p));
              // نرمال‌سازی
              let normalized = absolute.href.replace(/\/$/, '');
              return normalized;
            } catch {
              return null;
            }
          }

          function isContentPage(url, baseDomain) {
            // فیلتر فایل‌های غیر HTML
            const skipExtensions = ['.pdf', '.zip', '.jpg', '.jpeg', '.png', '.gif', '.svg', '.css', '.js', '.xml', '.rss', '.ico', '.woff', '.woff2'];
            const urlLower = url.toLowerCase();
            if (skipExtensions.some(ext => urlLower.includes(ext))) return false;
            
            // فیلتر صفحات لاگین، search، و صفحات خاص
            const skipPatterns = [
              '/login', '/signin', '/register', '/signup', '/search', 
              '/cart', '/checkout', '/account', '/admin', '/wp-admin',
              '/cdn-cgi/', '/tag/', '/category/', '/author/', '/feed/'
            ];
            if (skipPatterns.some(pattern => urlLower.includes(pattern))) return false;
            
            return true;
          }

          async function extractLinks(page, baseUrl) {
            return await page.evaluate(() => {
              const links = new Set();
              document.querySelectorAll('a[href]').forEach(a => {
                const href = a.getAttribute('href');
                if (href && 
                    !href.startsWith('#') && 
                    !href.startsWith('javascript:') && 
                    !href.startsWith('mailto:') && 
                    !href.startsWith('tel:') &&
                    !href.startsWith('data:') &&
                    href !== '/' &&
                    href !== '') {
                  links.add(href);
                }
              });
              return Array.from(links);
            });
          }

          (async () => {
            console.log(`🚀 راه‌اندازی مرورگر...`);
            console.log(`📍 آدرس هدف: ${TARGET_URL}`);
            console.log(`🔍 عمق خزش: ${MAX_DEPTH}`);
            console.log(`🌐 دامنه: ${BASE_DOMAIN}`);
            
            const browser = await puppeteer.launch({
              executablePath: CHROMIUM_PATH,
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu',
                '--disable-extensions',
                '--disable-background-networking',
                '--disable-sync',
                '--no-first-run',
                '--disable-features=TranslateUI'
              ]
            });

            let pageCount = 0;

            while (pagesToVisit.length > 0 && pageCount < MAX_PAGES) {
              const { url, depth } = pagesToVisit.shift();
              
              if (visited.has(url)) continue;
              if (depth > MAX_DEPTH) continue;
              if (!isContentPage(url, BASE_DOMAIN)) {
                console.log(`⊘ رد شد (غیر محتوایی): ${url}`);
                continue;
              }
              
              visited.add(url);
              pageCount++;
              
              const progressBar = '█'.repeat(Math.floor(pageCount/MAX_PAGES*20)) + '░'.repeat(20-Math.floor(pageCount/MAX_PAGES*20));
              console.log(`\n${progressBar} [${pageCount}/${MAX_PAGES}] 📄 ${url}`);
              
              let page;
              try {
                page = await browser.newPage();
                
                // تنظیم timeout طولانی‌تر
                page.setDefaultNavigationTimeout(30000);
                page.setDefaultTimeout(30000);
                
                await page.setViewport({ 
                  width: 1366, 
                  height: 768,
                  deviceScaleFactor: 2 // کیفیت بالاتر
                });
                
                await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
                
                // بلاک کردن منابع غیرضروری برای سرعت بیشتر
                await page.setRequestInterception(true);
                page.on('request', (req) => {
                  const resourceType = req.resourceType();
                  const url = req.url();
                  if (resourceType === 'image' || 
                      resourceType === 'stylesheet' || 
                      resourceType === 'font' ||
                      resourceType === 'media' ||
                      url.includes('analytics') ||
                      url.includes('tracking') ||
                      url.includes('doubleclick') ||
                      url.includes('googletagmanager')) {
                    req.abort();
                  } else {
                    req.continue();
                  }
                });

                // تلاش برای لود صفحه با مدیریت خطا
                try {
                  await page.goto(url, { 
                    waitUntil: 'networkidle0', 
                    timeout: 30000 
                  });
                } catch (navError) {
                  console.log(`⚠️ تلاش مجدد با waitUntil متفاوت...`);
                  try {
                    await page.goto(url, { 
                      waitUntil: 'domcontentloaded', 
                      timeout: 30000 
                    });
                  } catch (retryError) {
                    console.log(`⚠️ بارگذاری با محتوای موجود ادامه می‌یابد`);
                  }
                }

                // صبر برای render کامل
                await page.evaluate(() => new Promise(resolve => setTimeout(resolve, 1500)));

                // حذف عناصر مزاحم
                await page.evaluate(() => {
                  // حذف "Skip to content" و لینک‌های مشابه
                  const skipSelectors = [
                    '.skip-link',
                    '.skip-to-content',
                    '.skip-to-main',
                    '.screen-reader-text',
                    '[class*="skip"]',
                    '.sr-only',
                    '.visually-hidden',
                    '.skip-navigation',
                    'a[href="#main"]',
                    'a[href="#content"]',
                    'a[href="#main-content"]',
                    '#skiptocontent',
                    '.skiplink'
                  ];
                  
                  skipSelectors.forEach(selector => {
                    try {
                      document.querySelectorAll(selector).forEach(el => {
                        if (el.textContent.toLowerCase().includes('skip') || 
                            el.textContent.toLowerCase().includes('پرش')) {
                          el.remove();
                        }
                      });
                    } catch(e) {}
                  });

                  // حذف سایر عناصر غیرضروری
                  const removeSelectors = [
                    'script', 'style', 'iframe', 'noscript',
                    'nav', 'header', 'footer',
                    '.sidebar', '.menu', '.nav', '.navigation',
                    '.advertisement', '.ad', '.ads',
                    '.cookie-banner', '.cookie-consent', '.cookie-notice',
                    '.popup', '.modal', '.overlay',
                    '.social-share', '.social-links',
                    '.comments', '#comments',
                    '.related-posts', '.recommended',
                    '.search-form', '.search-box',
                    'form[role="search"]',
                    '.wp-block-latest-comments',
                    '#wpadminbar',
                    '.gdpr', '.cc-banner'
                  ];
                  
                  removeSelectors.forEach(selector => {
                    try {
                      document.querySelectorAll(selector).forEach(el => el.remove());
                    } catch(e) {}
                  });

                  // حذف spacer ها و المان‌های خالی
                  document.querySelectorAll('*').forEach(el => {
                    const style = window.getComputedStyle(el);
                    if ((el.children.length === 0 && el.textContent.trim() === '' && 
                         !el.querySelector('img') && !el.querySelector('svg')) ||
                        style.display === 'none' ||
                        style.visibility === 'hidden') {
                      // فقط عناصر کاملاً غیرضروری
                      if (el.tagName !== 'BR' && el.tagName !== 'HR' && el.tagName !== 'INPUT') {
                        el.remove();
                      }
                    }
                  });
                });

                // تولید PDF با تنظیمات بهتر
                const pdfBuffer = await page.pdf({
                  format: 'A4',
                  printBackground: true,
                  margin: { 
                    top: '20mm', 
                    bottom: '20mm', 
                    left: '15mm', 
                    right: '15mm' 
                  },
                  displayHeaderFooter: true,
                  headerTemplate: `
                    <div style="
                      font-size: 9px;
                      font-family: Arial, sans-serif;
                      text-align: center;
                      width: 100%;
                      padding: 8px;
                      color: #666;
                      border-bottom: 1px solid #eee;
                    ">
                      <span style="font-weight: bold;">${BASE_DOMAIN}</span> - ${new Date().toLocaleDateString('fa-IR')}
                    </div>
                  `,
                  footerTemplate: `
                    <div style="
                      font-size: 9px;
                      font-family: Arial, sans-serif;
                      text-align: center;
                      width: 100%;
                      padding: 8px;
                      color: #666;
                      border-top: 1px solid #eee;
                    ">
                      <span class="pageNumber"></span> / <span class="totalPages"></span>
                    </div>
                  `,
                  scale: 0.9
                });
                
                pdfBuffers.push({ 
                  url, 
                  buffer: pdfBuffer,
                  title: await page.title() || url
                });
                
                const sizeKB = (pdfBuffer.length / 1024).toFixed(1);
                console.log(`✅ ذخیره شد | ${sizeKB} KB | ${await page.title()}`.substring(0, 100));
                
                await page.close();
                page = null;

                // استخراج لینک‌ها برای عمق بیشتر
                if (depth < MAX_DEPTH && pagesToVisit.length < MAX_PAGES * 2) {
                  const explorePage = await browser.newPage();
                  try {
                    await explorePage.setRequestInterception(true);
                    explorePage.on('request', (req) => {
                      if (['image', 'stylesheet', 'font', 'media'].includes(req.resourceType())) {
                        req.abort();
                      } else {
                        req.continue();
                      }
                    });
                    
                    await explorePage.goto(url, { 
                      waitUntil: 'domcontentloaded', 
                      timeout: 15000 
                    });
                    
                    const links = await extractLinks(explorePage, url);
                    let addedLinks = 0;
                    
                    for (const link of links) {
                      const normalized = normalizeUrl(link, url);
                      if (normalized && !visited.has(normalized) && isContentPage(normalized, BASE_DOMAIN)) {
                        const alreadyPlanned = pagesToVisit.some(p => p.url === normalized);
                        if (!alreadyPlanned) {
                          pagesToVisit.push({ url: normalized, depth: depth + 1 });
                          addedLinks++;
                        }
                      }
                    }
                    
                    if (addedLinks > 0) {
                      console.log(`🔗 ${addedLinks} لینک جدید به صف اضافه شد (عمق ${depth + 1})`);
                    }
                  } catch (e) {
                    // خطا در استخراج لینک قابل چشم‌پوشی است
                  }
                  await explorePage.close();
                }
                
              } catch (error) {
                console.log(`❌ خطا: ${error.message.substring(0, 150)}`);
                if (page) {
                  try { await page.close(); } catch(e) {}
                }
              }
            }

            await browser.close();
            console.log(`\n${'='.repeat(50)}`);
            console.log(`📊 خلاصه:`);
            console.log(`   صفحات پردازش شده: ${pageCount}`);
            console.log(`   PDF‌های تولید شده: ${pdfBuffers.length}`);
            console.log(`   عمق خزش: ${MAX_DEPTH}`);

            if (pdfBuffers.length === 0) {
              console.error('❌ هیچ صفحه‌ای با موفقیت دریافت نشد!');
              process.exit(1);
            }

            // ادغام PDFها
            console.log(`\n📚 در حال ادغام ${pdfBuffers.length} فایل PDF...`);
            const mergedPdf = await PDFDocument.create();
            let mergedCount = 0;

            for (const { url, buffer, title } of pdfBuffers) {
              try {
                const singlePdf = await PDFDocument.load(buffer);
                const copiedPages = await mergedPdf.copyPages(singlePdf, singlePdf.getPageIndices());
                copiedPages.forEach(page => mergedPdf.addPage(page));
                mergedCount++;
              } catch (error) {
                console.log(`⚠️ خطا در ادغام PDF: ${url} - ${error.message}`);
              }
            }

            if (mergedCount === 0) {
              console.error('❌ ادغام PDFها با شکست مواجه شد');
              process.exit(1);
            }

            console.log(`📝 ${mergedCount} PDF با موفقیت ادغام شدند`);

            // ذخیره فایل نهایی
            const pdfBytes = await mergedPdf.save();
            
            // اطمینان از وجود پوشه خروجی
            const outputDir = path.dirname(OUTPUT_FILE);
            if (outputDir && outputDir !== '.') {
              fs.mkdirSync(outputDir, { recursive: true });
            }
            
            fs.writeFileSync(OUTPUT_FILE, pdfBytes);
            
            const sizeMB = (pdfBytes.length / (1024 * 1024)).toFixed(2);
            console.log(`\n${'='.repeat(50)}`);
            console.log(`✅ فایل نهایی با موفقیت ذخیره شد`);
            console.log(`📁 ${OUTPUT_FILE}`);
            console.log(`📦 حجم: ${sizeMB} MB`);
            console.log(`📄 تعداد صفحات PDF: ${mergedPdf.getPageCount()}`);
            
            // خروجی برای GitHub Actions
            console.log(`::set-output name=pdf_size::${sizeMB}`);
            console.log(`::set-output name=page_count::${pdfBuffers.length}`);
            
          })().catch(err => {
            console.error('❌ خطای بحرانی:', err.message);
            console.error(err.stack);
            process.exit(1);
          });
          SCRIPT_END

          echo "🚀 شروع فرآیند آرشیو..."
          node archive.js

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.filename }}
          path: ${{ github.event.inputs.filename }}.pdf
          retention-days: 90
          compression-level: 6

      - name: Commit to Repository
        if: success()
        run: |
          FILENAME="${{ github.event.inputs.filename }}.pdf"
          
          if [ ! -f "$FILENAME" ]; then
            echo "❌ فایل PDF یافت نشد: $FILENAME"
            ls -la
            exit 1
          fi
          
          # ایجاد پوشه archives اگر وجود نداشته باشد
          mkdir -p archives
          
          # کپی فایل به پوشه archives
          cp "$FILENAME" "archives/$FILENAME"
          
          # بررسی تغییرات
          if git diff --quiet && git diff --staged --quiet; then
            echo "✅ فایل بدون تغییر بود، کامیت جدیدی نیاز نیست"
            exit 0
          fi
          
          # تنظیم git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن و کامیت
          git add "archives/$FILENAME"
          
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          git commit -m "📚 آرشیو PDF: ${{ github.event.inputs.target_url }}" -m "تاریخ: ${TIMESTAMP}" -m "عمق: ${{ github.event.inputs.depth }}" || {
            echo "⚠️ کامیت با شکست مواجه شد یا تغییری برای کامیت وجود ندارد"
            git status
          }
          
          # Pull و Push با هندل کردن conflict
          git pull --rebase origin main || git pull origin main
          git push origin main || {
            echo "⚠️ Push به مشکل خورد، تلاش مجدد..."
            git pull --rebase origin main
            git push origin main
          }
          
          echo "✅ فایل PDF در مسیر archives/${FILENAME} ذخیره و push شد"
          
          # نمایش اطلاعات فایل
          ls -lh "archives/$FILENAME"
