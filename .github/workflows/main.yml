name: Website to PDF Archive

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'آدرس سایت (مثال: https://example.com)'
        required: true
        type: string
      depth:
        description: 'عمق دنبال کردن لینک‌ها (1 = فقط صفحه اصلی)'
        required: false
        type: choice
        options:
          - '1'
          - '2'
          - '3'
        default: '2'
      filename:
        description: 'نام فایل PDF خروجی'
        required: false
        type: string
        default: 'web-archive'

jobs:
  archive-to-pdf:
    name: Archive Website as PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            package-lock.json
          key: npm-packages-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-packages-${{ runner.os }}-
            npm-packages-

      - name: Cache Chromium
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/puppeteer
            /home/runner/.cache/puppeteer
          key: chromium-${{ runner.os }}-puppeteer
          restore-keys: |
            chromium-${{ runner.os }}-

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            chromium-browser \
            fonts-liberation \
            fonts-noto-color-emoji \
            fonts-ipafont-gothic \
            fonts-wqy-zenhei \
            fonts-thai-tlwg \
            fonts-kacst \
            fonts-freefont-ttf \
            --no-install-recommends 2>/dev/null || true

      - name: Initialize and Install npm packages
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: |
          if [ ! -f "package.json" ]; then
            npm init -y
          fi
          npm install puppeteer pdf-lib

      - name: Install npm packages (from cache)
        if: steps.cache-npm.outputs.cache-hit == 'true'
        run: |
          echo "✅ استفاده از node_modules کش شده"
          if [ ! -f "package.json" ]; then
            npm init -y
            npm install puppeteer pdf-lib
          else
            npm ci || npm install
          fi
          ls -la node_modules | head -20

      - name: Find Chromium Path
        id: chromium
        run: |
          CHROMIUM_PATH=$(which chromium-browser || which chromium || which google-chrome || echo "/usr/bin/chromium-browser")
          echo "path=$CHROMIUM_PATH" >> $GITHUB_OUTPUT
          echo "✓ Chromium found at: $CHROMIUM_PATH"

      - name: Archive Website to PDF
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          DEPTH: ${{ github.event.inputs.depth }}
          OUTPUT_FILE: ${{ github.event.inputs.filename }}.pdf
          CHROMIUM_PATH: ${{ steps.chromium.outputs.path }}
        run: |
          cat > archive.js << 'SCRIPT_END'
          const puppeteer = require('puppeteer');
          const { PDFDocument } = require('pdf-lib');
          const fs = require('fs');

          const TARGET_URL = process.env.TARGET_URL;
          const MAX_DEPTH = parseInt(process.env.DEPTH || '2');
          const OUTPUT_FILE = process.env.OUTPUT_FILE || 'web-archive.pdf';
          const CHROMIUM_PATH = process.env.CHROMIUM_PATH || '/usr/bin/chromium-browser';

          // اعتبارسنجی URL
          let BASE_DOMAIN;
          try {
            const parsedUrl = new URL(TARGET_URL);
            BASE_DOMAIN = parsedUrl.hostname;
            if (!parsedUrl.protocol.startsWith('http')) {
              throw new Error('پروتکل نامعتبر');
            }
          } catch(e) {
            console.error('❌ آدرس وارد شده معتبر نیست');
            process.exit(1);
          }

          console.log(`🚀 شروع آرشیو ${TARGET_URL}`);
          console.log(`🌐 دامنه: ${BASE_DOMAIN}`);
          console.log(`🔍 عمق: ${MAX_DEPTH}`);

          const visited = new Set();
          const pagesToVisit = [{ url: TARGET_URL, depth: 0 }];
          const pdfBuffers = [];
          const MAX_PAGES = 30;

          function normalizeUrl(url, base) {
            try {
              const absolute = new URL(url, base);
              if (absolute.hostname !== BASE_DOMAIN) return null;
              absolute.hash = '';
              ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'fbclid', 'gclid']
                .forEach(p => absolute.searchParams.delete(p));
              return absolute.href.replace(/\/$/, '');
            } catch {
              return null;
            }
          }

          function isContentPage(url) {
            const skipExtensions = ['.pdf', '.zip', '.jpg', '.jpeg', '.png', '.gif', '.svg', '.css', '.js', '.xml', '.ico', '.woff', '.woff2', '.mp4'];
            if (skipExtensions.some(ext => url.toLowerCase().includes(ext))) return false;
            
            const skipPatterns = [
              '/login', '/signin', '/register', '/signup', '/search',
              '/cart', '/checkout', '/account', '/admin', '/wp-admin',
              '/cdn-cgi/', '/tag/', '/category/', '/author/', '/feed/'
            ];
            return !skipPatterns.some(pattern => url.toLowerCase().includes(pattern));
          }

          (async () => {
            const browser = await puppeteer.launch({
              executablePath: CHROMIUM_PATH,
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu',
                '--disable-extensions',
                '--disable-background-networking',
                '--disable-sync'
              ]
            });

            let pageCount = 0;

            while (pagesToVisit.length > 0 && pageCount < MAX_PAGES) {
              const { url, depth } = pagesToVisit.shift();
              
              if (visited.has(url) || depth > MAX_DEPTH || !isContentPage(url)) continue;
              
              visited.add(url);
              pageCount++;
              
              console.log(`\n📄 [${pageCount}/${MAX_PAGES}] ${url}`);
              
              let page;
              try {
                page = await browser.newPage();
                await page.setViewport({ width: 1366, height: 768, deviceScaleFactor: 2 });
                
                // بلاک منابع غیرضروری
                await page.setRequestInterception(true);
                page.on('request', (req) => {
                  const type = req.resourceType();
                  const u = req.url();
                  if (['image', 'stylesheet', 'font', 'media'].includes(type) ||
                      u.includes('analytics') || u.includes('tracking') || 
                      u.includes('doubleclick') || u.includes('googletagmanager')) {
                    req.abort();
                  } else {
                    req.continue();
                  }
                });

                try {
                  await page.goto(url, { waitUntil: 'networkidle0', timeout: 30000 });
                } catch {
                  try {
                    await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 30000 });
                  } catch {
                    console.log('⚠️ بارگذاری ناقص');
                  }
                }

                await page.evaluate(() => new Promise(r => setTimeout(r, 2000)));

                // تمیزکاری کامل صفحه
                await page.evaluate(() => {
                  // حذف Skip to content
                  const skipPatterns = [
                    '.skip-link', '.skip-to-content', '.skip-to-main',
                    '.screen-reader-text', '[class*="skip"]',
                    '.sr-only', '.visually-hidden', '#skiptocontent'
                  ];
                  skipPatterns.forEach(sel => {
                    document.querySelectorAll(sel).forEach(el => {
                      if (el.textContent.toLowerCase().includes('skip') || 
                          el.textContent.includes('پرش')) el.remove();
                    });
                  });

                  // حذف عناصر غیرضروری
                  'script,style,iframe,nav,header,footer,.sidebar,.menu,.nav,.advertisement,.ad,.ads,.cookie-banner,.popup,.modal,.comments,.social-share,.newsletter,.back-to-top,[aria-hidden="true"]'
                    .split(',').forEach(sel => {
                      document.querySelectorAll(sel).forEach(el => el.remove());
                    });
                });

                const pdfBuffer = await page.pdf({
                  format: 'A4',
                  printBackground: true,
                  margin: { top: '20mm', bottom: '20mm', left: '15mm', right: '15mm' },
                  displayHeaderFooter: true,
                  headerTemplate: `<div style="font-size:9px;text-align:center;width:100%;padding:8px;color:#666;border-bottom:1px solid #eee"><b>${BASE_DOMAIN}</b> - ${new Date().toLocaleDateString('fa-IR')}</div>`,
                  footerTemplate: '<div style="font-size:9px;text-align:center;width:100%;padding:8px;color:#666;border-top:1px solid #eee"><span class="pageNumber"></span> / <span class="totalPages"></span></div>',
                  scale: 0.9
                });
                
                pdfBuffers.push({ url, buffer: pdfBuffer });
                console.log(`✅ ${(pdfBuffer.length/1024).toFixed(1)} KB`);
                
                await page.close();

                // استخراج لینک‌ها
                if (depth < MAX_DEPTH && pagesToVisit.length < MAX_PAGES * 2) {
                  const ep = await browser.newPage();
                  try {
                    await ep.setRequestInterception(true);
                    ep.on('request', (req) => {
                      if (['image', 'stylesheet', 'font', 'media'].includes(req.resourceType())) req.abort();
                      else req.continue();
                    });
                    
                    await ep.goto(url, { waitUntil: 'domcontentloaded', timeout: 15000 });
                    
                    const links = await ep.evaluate(() => {
                      const s = new Set();
                      document.querySelectorAll('a[href]').forEach(a => {
                        const h = a.getAttribute('href');
                        if (h && !h.startsWith('#') && !h.startsWith('javascript:') && 
                            !h.startsWith('mailto:') && !h.startsWith('tel:') && h !== '/') s.add(h);
                      });
                      return Array.from(s);
                    });

                    let added = 0;
                    for (const link of links) {
                      const n = normalizeUrl(link, url);
                      if (n && !visited.has(n) && isContentPage(n) && 
                          !pagesToVisit.some(p => p.url === n)) {
                        pagesToVisit.push({ url: n, depth: depth + 1 });
                        added++;
                      }
                    }
                    if (added) console.log(`🔗 +${added} لینک (عمق ${depth + 1})`);
                  } catch {}
                  await ep.close();
                }
              } catch (error) {
                console.log(`❌ ${error.message.substring(0, 100)}`);
                if (page) await page.close().catch(() => {});
              }
            }

            await browser.close();
            console.log(`\n📊 ${pdfBuffers.length} صفحه دریافت شد`);

            if (pdfBuffers.length === 0) {
              console.error('❌ هیچ صفحه‌ای دریافت نشد!');
              process.exit(1);
            }

            // ادغام PDFها
            console.log('📚 ادغام PDFها...');
            const mergedPdf = await PDFDocument.create();
            
            for (const { url, buffer } of pdfBuffers) {
              try {
                const single = await PDFDocument.load(buffer);
                const pages = await mergedPdf.copyPages(single, single.getPageIndices());
                pages.forEach(p => mergedPdf.addPage(p));
              } catch (e) {
                console.log(`⚠️ خطا در ادغام: ${url}`);
              }
            }

            const pdfBytes = await mergedPdf.save();
            fs.writeFileSync(OUTPUT_FILE, pdfBytes);
            
            const sizeMB = (pdfBytes.length / (1024 * 1024)).toFixed(2);
            console.log(`\n✅ ${OUTPUT_FILE} | ${sizeMB} MB | ${mergedPdf.getPageCount()} صفحه`);
            
          })().catch(err => {
            console.error('❌ خطا:', err);
            process.exit(1);
          });
          SCRIPT_END

          node archive.js

      - name: Push PDF to Repository
        if: success()
        run: |
          FILENAME="${{ github.event.inputs.filename }}.pdf"
          
          if [ ! -f "$FILENAME" ]; then
            echo "❌ فایل PDF یافت نشد"
            exit 1
          fi
          
          # اضافه کردن فایل PDF به ریپو
          git add "$FILENAME"
          
          # اضافه کردن package.json و package-lock.json برای کش
          if [ -f "package.json" ]; then
            git add package.json
          fi
          if [ -f "package-lock.json" ]; then
            git add package-lock.json
          fi
          
          # تنظیمات git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # کامیت
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          git commit -m "📚 PDF Archive: ${{ github.event.inputs.target_url }} ($TIMESTAMP)" || echo "بدون تغییر"
          
          # Pull و Push
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
          
          echo "✅ فایل در ریپو ذخیره شد"
          echo "📥 https://github.com/${{ github.repository }}/blob/main/$FILENAME"
          
          # نمایش حجم فایل
          ls -lh "$FILENAME"
