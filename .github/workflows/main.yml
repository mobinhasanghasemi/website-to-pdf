name: 🚀 Clean Website Archiver

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: '🌐 آدرس سایت'
        required: true
        type: string
      depth:
        description: '🔍 عمق خزیدن'
        required: false
        type: choice
        options: ['1', '2', '3']
        default: '2'
      filename:
        description: '📁 نام فایل خروجی'
        required: false
        type: string
        default: 'archive'

jobs:
  archive:
    name: 📚 Archive Website
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 300

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser --no-install-recommends || true
          npm init -y
          npm install puppeteer pdf-lib

      - name: 🔍 Find Chromium
        id: chromium
        run: |
          CHROMIUM_PATH=$(which chromium-browser || echo "/usr/bin/chromium-browser")
          echo "path=$CHROMIUM_PATH" >> $GITHUB_OUTPUT

      - name: 🕷️ Archive Website
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          DEPTH: ${{ github.event.inputs.depth }}
          OUTPUT_FILE: ${{ github.event.inputs.filename }}
          CHROMIUM_PATH: ${{ steps.chromium.outputs.path }}
        run: |
          cat > archive.js << 'SCRIPTEND'
          const puppeteer = require('puppeteer');
          const { PDFDocument } = require('pdf-lib');
          const fs = require('fs');

          const TARGET_URL = process.env.TARGET_URL;
          const MAX_DEPTH = parseInt(process.env.DEPTH || '2');
          const OUTPUT_FILE = process.env.OUTPUT_FILE || 'archive';
          const CHROMIUM_PATH = process.env.CHROMIUM_PATH || '/usr/bin/chromium-browser';
          const MAX_PAGES = 80;

          // المان‌های مزاحم برای حذف
          const REMOVE_SELECTORS = [
            '[href="#main-content"]', '[href="#content"]', '[href="#main"]',
            '.skip-link', '.skip-to-content', '.skip-navigation',
            '.cookie-banner', '.cookie-consent', '.cookie-notice', '.gdpr-banner',
            '.popup', '.modal', '.overlay', '.dialog',
            '.advertisement', '.ad-container', '.ad-banner', '.adsense',
            '[class*="ad-"]', '[id*="google_ads"]',
            '.social-share', '.share-buttons', '.social-links',
            '#comments', '.comments-area', '.comment-section',
            '.sidebar', '#sidebar', '.widget-area',
            'nav[role="navigation"]', '.navbar', '.main-navigation',
            '.back-to-top', '.scroll-to-top',
            'iframe[src*="youtube"]', 'iframe[src*="facebook"]',
            '.newsletter-popup', '.subscribe-popup',
            '.related-posts', '.recommended'
          ];

          let BASE_DOMAIN;
          const visited = new Set();
          const pagesToVisit = [{ url: TARGET_URL, depth: 0 }];
          const pdfBuffers = [];

          function normalizeUrl(url, base) {
            try {
              const absolute = new URL(url, base);
              if (absolute.hostname !== BASE_DOMAIN) return null;
              absolute.hash = '';
              absolute.search = '';
              return absolute.href.replace(/\/$/, '');
            } catch { return null; }
          }

          async function cleanPage(page) {
            await page.evaluate((selectors) => {
              selectors.forEach(selector => {
                try {
                  document.querySelectorAll(selector).forEach(el => {
                    if (el && el.parentNode) el.parentNode.removeChild(el);
                  });
                } catch(e) {}
              });

              // حذف المان‌های مخفی
              document.querySelectorAll('*').forEach(el => {
                const style = window.getComputedStyle(el);
                if (style.display === 'none' || style.visibility === 'hidden') {
                  if (el && el.parentNode) el.parentNode.removeChild(el);
                }
              });

              // حذف script و style
              document.querySelectorAll('script, style, noscript').forEach(el => {
                if (el && el.parentNode) el.parentNode.removeChild(el);
              });
            }, selectors);
          }

          async function extractLinks(page) {
            return await page.evaluate(() => {
              const links = [];
              document.querySelectorAll('a[href]').forEach(a => {
                const href = a.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('javascript:') && 
                    !href.startsWith('mailto:') && !href.startsWith('tel:') &&
                    !href.includes('login') && !href.includes('register')) {
                  links.push(href);
                }
              });
              return [...new Set(links)].slice(0, 30);
            });
          }

          (async () => {
            try { BASE_DOMAIN = new URL(TARGET_URL).hostname; }
            catch(e) { console.error('❌ آدرس نامعتبر'); process.exit(1); }

            console.log(`🌐 ${TARGET_URL} | عمق: ${MAX_DEPTH}`);
            console.log('─'.repeat(50));

            const browser = await puppeteer.launch({
              executablePath: CHROMIUM_PATH,
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });

            let count = 0;

            while (pagesToVisit.length > 0 && count < MAX_PAGES) {
              const { url, depth } = pagesToVisit.shift();
              
              if (visited.has(url) || depth > MAX_DEPTH) continue;
              
              visited.add(url);
              count++;
              
              console.log(`📄 [${count}] ${url.substring(0, 70)}`);
              
              try {
                const page = await browser.newPage();
                await page.setViewport({ width: 1280, height: 800 });
                await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36');
                
                await page.goto(url, { waitUntil: 'networkidle0', timeout: 25000 });
                await page.waitForTimeout(1000);

                await cleanPage(page);
                const title = await page.title();
                
                const pdfBuffer = await page.pdf({
                  format: 'A4',
                  printBackground: true,
                  margin: { top: '15mm', bottom: '15mm', left: '12mm', right: '12mm' },
                  displayHeaderFooter: true,
                  headerTemplate: `<div style="font-size:7px; color:#999; text-align:center; width:100%;">${title || url}</div>`,
                  footerTemplate: '<div style="font-size:7px; color:#999; text-align:center; width:100%;"><span class="pageNumber"></span>/<span class="totalPages"></span></div>'
                });

                pdfBuffers.push({ url, buffer: pdfBuffer, title });
                const kb = (pdfBuffer.length/1024).toFixed(0);
                console.log(`  ✅ ${kb} KB | ${title?.substring(0, 50)}`);

                await page.close();

                if (depth < MAX_DEPTH) {
                  const linkPage = await browser.newPage();
                  try {
                    await linkPage.goto(url, { waitUntil: 'domcontentloaded', timeout: 8000 });
                    const links = await extractLinks(linkPage);
                    
                    let added = 0;
                    for (const link of links) {
                      const normalized = normalizeUrl(link, url);
                      if (normalized && !visited.has(normalized) && !pagesToVisit.find(p => p.url === normalized)) {
                        pagesToVisit.push({ url: normalized, depth: depth + 1 });
                        added++;
                      }
                    }
                    if (added) console.log(`  🔗 ${added} لینک`);
                  } catch(e) {}
                  await linkPage.close();
                }

              } catch (error) {
                console.log(`  ⚠️ ${error.message.substring(0, 60)}`);
              }
            }

            await browser.close();

            if (pdfBuffers.length === 0) {
              console.error('❌ هیچ صفحه‌ای ذخیره نشد');
              process.exit(1);
            }

            console.log(`\n📚 ادغام ${pdfBuffers.length} PDF...`);
            
            const mergedPdf = await PDFDocument.create();
            
            for (const { buffer } of pdfBuffers) {
              try {
                const pdf = await PDFDocument.load(buffer);
                const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                pages.forEach(p => mergedPdf.addPage(p));
              } catch(e) {}
            }

            const finalPdf = await mergedPdf.save({ useObjectStreams: true });
            fs.writeFileSync(`${OUTPUT_FILE}.pdf`, finalPdf);
            
            const size = (finalPdf.length / (1024 * 1024)).toFixed(2);
            const totalPages = mergedPdf.getPageCount();
            
            console.log('─'.repeat(50));
            console.log(`✅ تمام! ${pdfBuffers.length} صفحه وب`);
            console.log(`📄 ${totalPages} صفحه PDF | 💾 ${size} MB`);

            // فهرست صفحات
            const list = pdfBuffers.map((p, i) => `${i+1}. ${p.title || p.url}`).join('\n');
            fs.writeFileSync(`${OUTPUT_FILE}.txt`, list);
            
          })().catch(err => {
            console.error('❌ خطا:', err.message);
            process.exit(1);
          });
          SCRIPTEND

          node archive.js

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.filename }}
          path: |
            ${{ github.event.inputs.filename }}.pdf
            ${{ github.event.inputs.filename }}.txt
          retention-days: 90

      - name: 💾 Save to Repository
        if: success()
        run: |
          FILENAME="${{ github.event.inputs.filename }}"
          mkdir -p archives/${FILENAME}
          
          cp ${FILENAME}.pdf archives/${FILENAME}/ 2>/dev/null || true
          cp ${FILENAME}.txt archives/${FILENAME}/ 2>/dev/null || true
          
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add archives/
          git commit -m "📚 ${FILENAME} - ${{ github.event.inputs.target_url }}" || echo "بدون تغییر"
          git pull --rebase origin main
          git push origin main

      - name: ✅ Summary
        run: |
          echo "## ✅ آرشیو کامل شد" >> $GITHUB_STEP_SUMMARY
          echo "**فایل:** ${{ github.event.inputs.filename }}.pdf" >> $GITHUB_STEP_SUMMARY
          echo "**آدرس:** ${{ github.event.inputs.target_url }}" >> $GITHUB_STEP_SUMMARY
