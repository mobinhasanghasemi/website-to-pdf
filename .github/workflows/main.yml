name: Website to PDF Archive

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'آدرس سایت (مثال: https://example.com)'
        required: true
        type: string
      depth:
        description: 'عمق دنبال کردن لینک‌ها (1 = فقط صفحه اصلی)'
        required: false
        type: choice
        options:
          - '1'
          - '2'
          - '3'
        default: '2'
      filename:
        description: 'نام فایل PDF خروجی'
        required: false
        type: string
        default: 'web-archive'

jobs:
  archive-to-pdf:
    name: Archive Website as PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            chromium-browser \
            fonts-ipafont-gothic \
            fonts-wqy-zenhei \
            fonts-thai-tlwg \
            fonts-kacst \
            fonts-freefont-ttf \
            --no-install-recommends || true

      - name: Install npm packages
        run: |
          npm init -y
          npm install puppeteer pdf-lib

      - name: Find Chromium Path
        id: chromium
        run: |
          CHROMIUM_PATH=$(which chromium-browser || which chromium || which google-chrome || echo "/usr/bin/chromium-browser")
          echo "path=$CHROMIUM_PATH" >> $GITHUB_OUTPUT
          echo "Chromium found at: $CHROMIUM_PATH"

      - name: Archive Website to PDF
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          DEPTH: ${{ github.event.inputs.depth }}
          OUTPUT_FILE: ${{ github.event.inputs.filename }}.pdf
          CHROMIUM_PATH: ${{ steps.chromium.outputs.path }}
        run: |
          cat > archive.js << 'SCRIPT_END'
          const puppeteer = require('puppeteer');
          const { PDFDocument } = require('pdf-lib');
          const fs = require('fs');

          const TARGET_URL = process.env.TARGET_URL;
          const MAX_DEPTH = parseInt(process.env.DEPTH || '2');
          const OUTPUT_FILE = process.env.OUTPUT_FILE || 'web-archive.pdf';
          const CHROMIUM_PATH = process.env.CHROMIUM_PATH || '/usr/bin/chromium-browser';
          
          let BASE_DOMAIN;
          try {
            BASE_DOMAIN = new URL(TARGET_URL).hostname;
          } catch(e) {
            console.error('❌ آدرس وارد شده معتبر نیست');
            process.exit(1);
          }

          const visited = new Set();
          const pagesToVisit = [{ url: TARGET_URL, depth: 0 }];
          const pdfBuffers = [];

          function normalizeUrl(url, base) {
            try {
              const absolute = new URL(url, base);
              if (absolute.hostname !== BASE_DOMAIN) return null;
              absolute.hash = '';
              absolute.search = '';
              return absolute.href.replace(/\/$/, '');
            } catch {
              return null;
            }
          }

          async function extractLinks(page, baseUrl) {
            return await page.evaluate(() => {
              const links = [];
              document.querySelectorAll('a[href]').forEach(a => {
                const href = a.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('javascript:') && 
                    !href.startsWith('mailto:') && !href.startsWith('tel:')) {
                  links.push(href);
                }
              });
              return links;
            });
          }

          (async () => {
            console.log(`🚀 راه‌اندازی مرورگر از مسیر: ${CHROMIUM_PATH}`);
            
            const browser = await puppeteer.launch({
              executablePath: CHROMIUM_PATH,
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu',
                '--disable-extensions'
              ]
            });

            let pageCount = 0;
            const maxPages = 50; // محدودیت برای جلوگیری از timeout

            while (pagesToVisit.length > 0 && pageCount < maxPages) {
              const { url, depth } = pagesToVisit.shift();
              
              if (visited.has(url)) continue;
              if (depth > MAX_DEPTH) continue;
              
              visited.add(url);
              pageCount++;
              
              console.log(`\n📄 [${pageCount}/${maxPages}] دریافت: ${url}`);
              
              try {
                const page = await browser.newPage();
                await page.setViewport({ width: 1280, height: 800 });
                await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
                
                await page.goto(url, { 
                  waitUntil: 'networkidle0', 
                  timeout: 25000 
                }).catch(() => {
                  console.log('⚠️ بارگذاری کامل صفحه ممکن نشد، ادامه با محتوای موجود...');
                });

                // کمی صبر برای لود کامل
                await new Promise(r => setTimeout(r, 2000));

                await page.evaluate(() => {
                  const removables = 'script, style, iframe, nav, .sidebar, .menu, .nav, .advertisement, .cookie-banner, .popup, .modal, [role="navigation"]';
                  document.querySelectorAll(removables).forEach(el => el.remove());
                });

                const pdfBuffer = await page.pdf({
                  format: 'A4',
                  printBackground: true,
                  margin: { top: '15mm', bottom: '15mm', left: '10mm', right: '10mm' },
                  displayHeaderFooter: true,
                  headerTemplate: '<div style="font-size:8px; text-align:center; width:100%; padding:5px;">' + url.substring(0, 100) + '</div>',
                  footerTemplate: '<div style="font-size:8px; text-align:center; width:100%;"><span class="pageNumber"></span> / <span class="totalPages"></span></div>'
                });
                
                pdfBuffers.push({ url, buffer: pdfBuffer });
                console.log(`✅ ذخیره شد (${(pdfBuffer.length/1024).toFixed(1)} KB)`);
                
                await page.close();

                if (depth < MAX_DEPTH) {
                  const explorePage = await browser.newPage();
                  try {
                    await explorePage.goto(url, { waitUntil: 'domcontentloaded', timeout: 10000 });
                    const links = await extractLinks(explorePage, url);
                    
                    for (const link of links) {
                      const normalized = normalizeUrl(link, url);
                      if (normalized && !visited.has(normalized)) {
                        const alreadyPlanned = pagesToVisit.some(p => p.url === normalized);
                        if (!alreadyPlanned) {
                          pagesToVisit.push({ url: normalized, depth: depth + 1 });
                        }
                      }
                    }
                    console.log(`🔗 ${links.length} لینک پیدا شد`);
                  } catch (e) {
                    console.log('⚠️ خطا در استخراج لینک‌ها');
                  }
                  await explorePage.close();
                }
                
              } catch (error) {
                console.log(`❌ خطا: ${error.message.substring(0, 100)}`);
              }
            }

            await browser.close();
            console.log(`\n📊 مجموع صفحات دریافت شده: ${pdfBuffers.length}`);

            if (pdfBuffers.length === 0) {
              console.error('❌ هیچ صفحه‌ای دریافت نشد!');
              process.exit(1);
            }

            console.log('📚 در حال ادغام PDFها...');
            const mergedPdf = await PDFDocument.create();

            for (const { url, buffer } of pdfBuffers) {
              try {
                const singlePdf = await PDFDocument.load(buffer);
                const copiedPages = await mergedPdf.copyPages(singlePdf, singlePdf.getPageIndices());
                copiedPages.forEach(page => mergedPdf.addPage(page));
              } catch (error) {
                console.log(`⚠️ خطا در ادغام: ${url}`);
              }
            }

            const pdfBytes = await mergedPdf.save();
            fs.writeFileSync(OUTPUT_FILE, pdfBytes);
            
            const sizeMB = (pdfBytes.length / (1024 * 1024)).toFixed(2);
            console.log(`\n✅ فایل نهایی: ${OUTPUT_FILE}`);
            console.log(`📦 حجم: ${sizeMB} MB`);
            console.log(`📄 صفحات: ${pdfBuffers.length}`);
          })().catch(err => {
            console.error('❌ خطای کلی:', err);
            process.exit(1);
          });
          SCRIPT_END

          echo "شروع آرشیو..."
          node archive.js

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.filename }}
          path: ${{ github.event.inputs.filename }}.pdf
          retention-days: 90

      - name: Commit to Repository
        if: success()
        run: |
          FILENAME="${{ github.event.inputs.filename }}.pdf"
          
          if [ ! -f "$FILENAME" ]; then
            echo "❌ فایل PDF یافت نشد"
            exit 1
          fi
          
          mkdir -p archives
          cp "$FILENAME" "archives/$FILENAME"
          
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add "archives/$FILENAME"
          
          git commit -m "📚 ذخیره PDF: ${{ github.event.inputs.target_url }} ($(date +%Y-%m-%d_%H:%M))" || echo "بدون تغییر جدید"
          git pull --rebase origin main
          git push origin main
          
          echo "✅ فایل در archives/$FILENAME ذخیره شد"
