name: Website to PDF Archive

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'آدرس سایت (مثال: https://example.com)'
        required: true
        type: string
      depth:
        description: 'عمق دنبال کردن لینک‌ها (1 = فقط صفحه اصلی)'
        required: false
        type: choice
        options:
          - '1'
          - '2'
          - '3'
        default: '2'
      filename:
        description: 'نام فایل PDF خروجی'
        required: false
        type: string
        default: 'web-archive'

jobs:
  archive-to-pdf:
    name: Archive Website as PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            package-lock.json
          key: npm-packages-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-packages-${{ runner.os }}-
            npm-packages-

      - name: Cache Chromium
        id: cache-chromium
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/puppeteer
            /home/runner/.cache/puppeteer
          key: chromium-${{ runner.os }}-puppeteer
          restore-keys: |
            chromium-${{ runner.os }}-

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            chromium-browser \
            fonts-liberation \
            fonts-noto-color-emoji \
            fonts-ipafont-gothic \
            fonts-wqy-zenhei \
            fonts-thai-tlwg \
            fonts-kacst \
            fonts-freefont-ttf \
            --no-install-recommends 2>/dev/null || true

      - name: Initialize and Install npm packages
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: |
          if [ ! -f "package.json" ]; then
            npm init -y
          fi
          npm install puppeteer pdf-lib

      - name: Install npm packages (from cache)
        if: steps.cache-npm.outputs.cache-hit == 'true'
        run: |
          echo "✅ استفاده از node_modules کش شده"
          if [ ! -f "package.json" ]; then
            npm init -y
            npm install puppeteer pdf-lib
          else
            npm ci || npm install
          fi

      - name: Find Chromium Path
        id: chromium
        run: |
          CHROMIUM_PATH=$(which chromium-browser || which chromium || which google-chrome || echo "/usr/bin/chromium-browser")
          echo "path=$CHROMIUM_PATH" >> $GITHUB_OUTPUT
          echo "✓ Chromium found at: $CHROMIUM_PATH"

      - name: Archive Website to PDF
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          DEPTH: ${{ github.event.inputs.depth }}
          OUTPUT_FILE: ${{ github.event.inputs.filename }}.pdf
          CHROMIUM_PATH: ${{ steps.chromium.outputs.path }}
        run: |
          cat > archive.js << 'SCRIPT_END'
          const puppeteer = require('puppeteer');
          const { PDFDocument } = require('pdf-lib');
          const fs = require('fs');

          const TARGET_URL = process.env.TARGET_URL;
          const MAX_DEPTH = parseInt(process.env.DEPTH || '2');
          const OUTPUT_FILE = process.env.OUTPUT_FILE || 'web-archive.pdf';
          const CHROMIUM_PATH = process.env.CHROMIUM_PATH || '/usr/bin/chromium-browser';

          // اعتبارسنجی URL
          let BASE_DOMAIN;
          try {
            const parsedUrl = new URL(TARGET_URL);
            BASE_DOMAIN = parsedUrl.hostname;
            if (!parsedUrl.protocol.startsWith('http')) {
              throw new Error('پروتکل نامعتبر');
            }
          } catch(e) {
            console.error('❌ آدرس وارد شده معتبر نیست');
            process.exit(1);
          }

          console.log(`🚀 شروع آرشیو ${TARGET_URL}`);
          console.log(`🌐 دامنه: ${BASE_DOMAIN}`);
          console.log(`🔍 عمق: ${MAX_DEPTH}`);

          const visited = new Set();
          const pagesToVisit = [{ url: TARGET_URL, depth: 0 }];
          const pdfBuffers = [];
          const MAX_PAGES = 30;

          function normalizeUrl(url, base) {
            try {
              const absolute = new URL(url, base);
              if (absolute.hostname !== BASE_DOMAIN) return null;
              absolute.hash = '';
              ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'fbclid', 'gclid']
                .forEach(p => absolute.searchParams.delete(p));
              return absolute.href.replace(/\/$/, '');
            } catch {
              return null;
            }
          }

          function isContentPage(url) {
            const skipExtensions = ['.pdf', '.zip', '.jpg', '.jpeg', '.png', '.gif', '.svg', '.css', '.js', '.xml', '.ico', '.woff', '.woff2', '.mp4'];
            if (skipExtensions.some(ext => url.toLowerCase().includes(ext))) return false;
            
            const skipPatterns = [
              '/login', '/signin', '/register', '/signup', '/search',
              '/cart', '/checkout', '/account', '/admin', '/wp-admin',
              '/cdn-cgi/', '/tag/', '/category/', '/author/', '/feed/'
            ];
            return !skipPatterns.some(pattern => url.toLowerCase().includes(pattern));
          }

          (async () => {
            const browser = await puppeteer.launch({
              executablePath: CHROMIUM_PATH,
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu',
                '--disable-extensions',
                '--disable-background-networking',
                '--disable-sync'
              ]
            });

            let pageCount = 0;

            while (pagesToVisit.length > 0 && pageCount < MAX_PAGES) {
              const { url, depth } = pagesToVisit.shift();
              
              if (visited.has(url) || depth > MAX_DEPTH || !isContentPage(url)) continue;
              
              visited.add(url);
              pageCount++;
              
              console.log(`\n📄 [${pageCount}/${MAX_PAGES}] ${url}`);
              
              let page;
              try {
                page = await browser.newPage();
                await page.setViewport({ 
                  width: 1366, 
                  height: 768,
                  deviceScaleFactor: 2 // کیفیت بالا
                });
                
                // فقط فونت‌ها رو بلاک می‌کنیم (برای سرعت)، بقیه رو لود می‌کنیم
                // اینطوری استایل‌ها و تصاویر کامل می‌مونن
                await page.setRequestInterception(true);
                page.on('request', (req) => {
                  const resourceType = req.resourceType();
                  const reqUrl = req.url();
                  
                  // فقط ترکرها و آنالیتیکس رو بلاک کن، بقیه رو بذار باشه
                  if (reqUrl.includes('analytics') || 
                      reqUrl.includes('tracking') || 
                      reqUrl.includes('doubleclick') || 
                      reqUrl.includes('googletagmanager') ||
                      reqUrl.includes('google-analytics') ||
                      reqUrl.includes('facebook.com/tr')) {
                    req.abort();
                  } else {
                    req.continue();
                  }
                });

                // لود کامل صفحه با همه منابع
                try {
                  await page.goto(url, { 
                    waitUntil: 'networkidle0',  // صبر کن تا همه چی لود بشه
                    timeout: 60000  // تایم‌اوت 60 ثانیه برای لود کامل
                  });
                } catch {
                  console.log('⚠️ تلاش مجدد با networkidle2...');
                  try {
                    await page.goto(url, { 
                      waitUntil: 'networkidle2', 
                      timeout: 60000 
                    });
                  } catch {
                    console.log('⚠️ ادامه با محتوای موجود');
                  }
                }

                // صبر برای لود کامل CSS و فونت‌ها
                await page.evaluate(() => new Promise(resolve => setTimeout(resolve, 3000)));

                // صبر برای اتمام لود همه تصاویر
                await page.evaluate(async () => {
                  const images = Array.from(document.images);
                  await Promise.all(images.map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise((resolve) => {
                      img.addEventListener('load', resolve);
                      img.addEventListener('error', resolve); // حتی اگر خطا خورد ادامه بده
                      setTimeout(resolve, 5000); // حداکثر 5 ثانیه صبر کن
                    });
                  }));
                });

                // حذف فقط Skip to content (بدون دست زدن به استایل‌ها)
                await page.evaluate(() => {
                  // فقط Skip to content و موارد مشابه رو حذف کن
                  const skipSelectors = [
                    '.skip-link', '.skip-to-content', '.skip-to-main',
                    '.skip-navigation', '#skiptocontent', '.skiplink',
                    'a[href="#main"]', 'a[href="#content"]', 'a[href="#main-content"]'
                  ];
                  
                  skipSelectors.forEach(selector => {
                    try {
                      document.querySelectorAll(selector).forEach(el => {
                        const text = el.textContent?.toLowerCase() || '';
                        if (text.includes('skip') || text.includes('پرش') || text.includes('رد کردن')) {
                          el.remove();
                        }
                      });
                    } catch(e) {}
                  });

                  // حذف screen-reader-text فقط (بدون تغییر سایر استایل‌ها)
                  document.querySelectorAll('.screen-reader-text, .sr-only, .visually-hidden').forEach(el => {
                    if (el.textContent?.toLowerCase().includes('skip') || 
                        el.textContent?.includes('پرش')) {
                      el.remove();
                    }
                  });
                });

                // PDF با printBackground: true برای حفظ همه استایل‌ها و رنگ‌ها
                const pdfBuffer = await page.pdf({
                  format: 'A4',
                  printBackground: true,  // حفظ بکگراندها و رنگ‌ها
                  margin: { 
                    top: '15mm', 
                    bottom: '15mm', 
                    left: '10mm', 
                    right: '10mm' 
                  },
                  displayHeaderFooter: true,
                  headerTemplate: `
                    <div style="
                      font-size: 9px;
                      font-family: Arial, sans-serif;
                      text-align: center;
                      width: 100%;
                      padding: 8px;
                      color: #666;
                      border-bottom: 1px solid #eee;
                    ">
                      <span style="font-weight: bold;">${BASE_DOMAIN}</span> - ${new Date().toLocaleDateString('fa-IR')}
                    </div>
                  `,
                  footerTemplate: `
                    <div style="
                      font-size: 9px;
                      font-family: Arial, sans-serif;
                      text-align: center;
                      width: 100%;
                      padding: 8px;
                      color: #666;
                      border-top: 1px solid #eee;
                    ">
                      <span class="pageNumber"></span> / <span class="totalPages"></span>
                    </div>
                  `,
                  scale: 1,  // سایز کامل
                  preferCSSPageSize: false
                });
                
                pdfBuffers.push({ url, buffer: pdfBuffer });
                console.log(`✅ ${(pdfBuffer.length/1024).toFixed(1)} KB - کامل با استایل`);
                
                await page.close();

                // استخراج لینک‌ها
                if (depth < MAX_DEPTH && pagesToVisit.length < MAX_PAGES * 2) {
                  const ep = await browser.newPage();
                  try {
                    await ep.setRequestInterception(true);
                    ep.on('request', (req) => {
                      if (['font'].includes(req.resourceType())) req.abort();  // فقط فونت برای سرعت
                      else req.continue();
                    });
                    
                    await ep.goto(url, { 
                      waitUntil: 'domcontentloaded', 
                      timeout: 15000 
                    });
                    
                    const links = await ep.evaluate(() => {
                      const s = new Set();
                      document.querySelectorAll('a[href]').forEach(a => {
                        const h = a.getAttribute('href');
                        if (h && !h.startsWith('#') && !h.startsWith('javascript:') && 
                            !h.startsWith('mailto:') && !h.startsWith('tel:') && h !== '/') s.add(h);
                      });
                      return Array.from(s);
                    });

                    let added = 0;
                    for (const link of links) {
                      const n = normalizeUrl(link, url);
                      if (n && !visited.has(n) && isContentPage(n) && 
                          !pagesToVisit.some(p => p.url === n)) {
                        pagesToVisit.push({ url: n, depth: depth + 1 });
                        added++;
                      }
                    }
                    if (added) console.log(`🔗 +${added} لینک جدید`);
                  } catch {}
                  await ep.close();
                }
              } catch (error) {
                console.log(`❌ ${error.message.substring(0, 100)}`);
                if (page) await page.close().catch(() => {});
              }
            }

            await browser.close();
            console.log(`\n📊 ${pdfBuffers.length} صفحه دریافت شد (با استایل کامل)`);

            if (pdfBuffers.length === 0) {
              console.error('❌ هیچ صفحه‌ای دریافت نشد!');
              process.exit(1);
            }

            // ادغام PDFها (حفظ همه استایل‌ها)
            console.log('📚 ادغام PDFها...');
            const mergedPdf = await PDFDocument.create();
            
            for (const { url, buffer } of pdfBuffers) {
              try {
                const single = await PDFDocument.load(buffer);
                const pages = await mergedPdf.copyPages(single, single.getPageIndices());
                pages.forEach(p => mergedPdf.addPage(p));
              } catch (e) {
                console.log(`⚠️ خطا در ادغام: ${url}`);
              }
            }

            const pdfBytes = await mergedPdf.save();
            fs.writeFileSync(OUTPUT_FILE, pdfBytes);
            
            const sizeMB = (pdfBytes.length / (1024 * 1024)).toFixed(2);
            console.log(`\n✅ ${OUTPUT_FILE} | ${sizeMB} MB | ${mergedPdf.getPageCount()} صفحه`);
            console.log('🎨 همه استایل‌ها، رنگ‌ها و تصاویر حفظ شدن');
            
          })().catch(err => {
            console.error('❌ خطا:', err);
            process.exit(1);
          });
          SCRIPT_END

          node archive.js

      - name: Push PDF to Repository
        if: success()
        run: |
          FILENAME="${{ github.event.inputs.filename }}.pdf"
          
          if [ ! -f "$FILENAME" ]; then
            echo "❌ فایل PDF یافت نشد"
            exit 1
          fi
          
          git add "$FILENAME"
          
          if [ -f "package.json" ]; then
            git add package.json
          fi
          if [ -f "package-lock.json" ]; then
            git add package-lock.json
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          git commit -m "📚 PDF Archive: ${{ github.event.inputs.target_url }} ($TIMESTAMP)" || echo "بدون تغییر"
          
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
          
          echo "✅ فایل در ریپو ذخیره شد"
          echo "📥 https://github.com/${{ github.repository }}/blob/main/$FILENAME"
          ls -lh "$FILENAME"
