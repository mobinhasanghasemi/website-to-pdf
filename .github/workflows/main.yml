name: Website to PDF Archive

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'آدرس سایت (مثال: https://example.com)'
        required: true
        type: string
      depth:
        description: 'عمق دنبال کردن لینک‌ها (1 = فقط صفحه اصلی)'
        required: false
        type: choice
        options:
          - '1'
          - '2'
          - '3'
        default: '2'
      filename:
        description: 'نام فایل PDF خروجی'
        required: false
        type: string
        default: 'web-archive'

jobs:
  archive-to-pdf:
    name: Archive Website as PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            chromium-browser \
            fonts-liberation \
            fonts-noto-color-emoji \
            fonts-ipafont-gothic \
            fonts-wqy-zenhei \
            fonts-thai-tlwg \
            fonts-kacst \
            fonts-freefont-ttf \
            --no-install-recommends 2>/dev/null || true

      - name: Install npm packages
        run: |
          npm init -y
          npm install puppeteer pdf-lib

      - name: Find Chromium Path
        id: chromium
        run: |
          CHROMIUM_PATH=$(which chromium-browser || which chromium || which google-chrome || echo "/usr/bin/chromium-browser")
          echo "path=$CHROMIUM_PATH" >> $GITHUB_OUTPUT
          echo "✓ Chromium found at: $CHROMIUM_PATH"

      - name: Archive Website to PDF
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          DEPTH: ${{ github.event.inputs.depth }}
          OUTPUT_FILE: ${{ github.event.inputs.filename }}.pdf
          CHROMIUM_PATH: ${{ steps.chromium.outputs.path }}
        run: |
          cat > archive.js << 'SCRIPT_END'
          const puppeteer = require('puppeteer');
          const { PDFDocument } = require('pdf-lib');
          const fs = require('fs');
          const path = require('path');

          const TARGET_URL = process.env.TARGET_URL;
          const MAX_DEPTH = parseInt(process.env.DEPTH || '2');
          const OUTPUT_FILE = process.env.OUTPUT_FILE || 'web-archive.pdf';
          const CHROMIUM_PATH = process.env.CHROMIUM_PATH || '/usr/bin/chromium-browser';

          // اعتبارسنجی URL
          let BASE_DOMAIN;
          try {
            const parsedUrl = new URL(TARGET_URL);
            BASE_DOMAIN = parsedUrl.hostname;
            if (!parsedUrl.protocol.startsWith('http')) {
              throw new Error('پروتکل نامعتبر');
            }
          } catch(e) {
            console.error('❌ آدرس وارد شده معتبر نیست');
            console.error(e.message);
            process.exit(1);
          }

          const visited = new Set();
          const pagesToVisit = [{ url: TARGET_URL, depth: 0 }];
          const pdfBuffers = [];
          const MAX_PAGES = 30;

          function normalizeUrl(url, base) {
            try {
              const absolute = new URL(url, base);
              if (absolute.hostname !== BASE_DOMAIN) return null;
              absolute.hash = '';
              const trackingParams = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'fbclid', 'gclid'];
              trackingParams.forEach(p => absolute.searchParams.delete(p));
              let normalized = absolute.href.replace(/\/$/, '');
              return normalized;
            } catch {
              return null;
            }
          }

          function isContentPage(url) {
            const skipExtensions = ['.pdf', '.zip', '.jpg', '.jpeg', '.png', '.gif', '.svg', '.css', '.js', '.xml', '.rss', '.ico', '.woff', '.woff2', '.mp4', '.webm'];
            const urlLower = url.toLowerCase();
            if (skipExtensions.some(ext => urlLower.includes(ext))) return false;
            
            const skipPatterns = [
              '/login', '/signin', '/register', '/signup', '/search', 
              '/cart', '/checkout', '/account', '/admin', '/wp-admin',
              '/cdn-cgi/', '/tag/', '/category/', '/author/', '/feed/',
              '/wp-json/', '/xmlrpc'
            ];
            if (skipPatterns.some(pattern => urlLower.includes(pattern))) return false;
            
            return true;
          }

          async function extractLinks(page) {
            return await page.evaluate(() => {
              const links = new Set();
              document.querySelectorAll('a[href]').forEach(a => {
                const href = a.getAttribute('href');
                if (href && 
                    !href.startsWith('#') && 
                    !href.startsWith('javascript:') && 
                    !href.startsWith('mailto:') && 
                    !href.startsWith('tel:') &&
                    !href.startsWith('data:') &&
                    href !== '/' &&
                    href !== '') {
                  links.add(href);
                }
              });
              return Array.from(links);
            });
          }

          (async () => {
            console.log(`🚀 راه‌اندازی مرورگر...`);
            console.log(`📍 آدرس هدف: ${TARGET_URL}`);
            console.log(`🔍 عمق خزش: ${MAX_DEPTH}`);
            console.log(`🌐 دامنه: ${BASE_DOMAIN}`);
            
            const browser = await puppeteer.launch({
              executablePath: CHROMIUM_PATH,
              headless: 'new',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu',
                '--disable-extensions',
                '--disable-background-networking',
                '--disable-sync',
                '--no-first-run',
                '--disable-features=TranslateUI'
              ]
            });

            let pageCount = 0;

            while (pagesToVisit.length > 0 && pageCount < MAX_PAGES) {
              const { url, depth } = pagesToVisit.shift();
              
              if (visited.has(url)) continue;
              if (depth > MAX_DEPTH) continue;
              if (!isContentPage(url)) {
                console.log(`⊘ رد شد: ${url}`);
                continue;
              }
              
              visited.add(url);
              pageCount++;
              
              console.log(`\n📄 [${pageCount}/${MAX_PAGES}] ${url}`);
              
              let page;
              try {
                page = await browser.newPage();
                
                page.setDefaultNavigationTimeout(30000);
                page.setDefaultTimeout(30000);
                
                await page.setViewport({ 
                  width: 1366, 
                  height: 768,
                  deviceScaleFactor: 2
                });
                
                // User agent فارسی/ایرانی
                await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36');
                
                // بلاک کردن منابع غیرضروری
                await page.setRequestInterception(true);
                page.on('request', (req) => {
                  const resourceType = req.resourceType();
                  const reqUrl = req.url();
                  if (resourceType === 'image' || 
                      resourceType === 'stylesheet' || 
                      resourceType === 'font' ||
                      resourceType === 'media' ||
                      reqUrl.includes('analytics') ||
                      reqUrl.includes('tracking') ||
                      reqUrl.includes('doubleclick') ||
                      reqUrl.includes('googletagmanager') ||
                      reqUrl.includes('google-analytics') ||
                      reqUrl.includes('facebook')) {
                    req.abort();
                  } else {
                    req.continue();
                  }
                });

                // لود صفحه با مدیریت خطا
                try {
                  await page.goto(url, { 
                    waitUntil: 'networkidle0', 
                    timeout: 30000 
                  });
                } catch (navError) {
                  console.log(`⚠️ تلاش مجدد...`);
                  try {
                    await page.goto(url, { 
                      waitUntil: 'domcontentloaded', 
                      timeout: 30000 
                    });
                  } catch (retryError) {
                    console.log(`⚠️ ادامه با محتوای موجود`);
                  }
                }

                // صبر برای render کامل
                await page.evaluate(() => new Promise(resolve => setTimeout(resolve, 2000)));

                // حذف عناصر مزاحم
                await page.evaluate(() => {
                  // حذف "Skip to content" و موارد مشابه
                  const skipSelectors = [
                    '.skip-link', '.skip-to-content', '.skip-to-main',
                    '.screen-reader-text', '[class*="skip"]',
                    '.sr-only', '.visually-hidden', '.skip-navigation',
                    'a[href="#main"]', 'a[href="#content"]', 
                    'a[href="#main-content"]', '#skiptocontent', '.skiplink',
                    '.elementor-screen-only', '.screen-reader-shortcut'
                  ];
                  
                  skipSelectors.forEach(selector => {
                    try {
                      document.querySelectorAll(selector).forEach(el => {
                        const text = el.textContent.toLowerCase();
                        if (text.includes('skip') || 
                            text.includes('پرش') ||
                            text.includes('رد کردن') ||
                            text.includes('محتوای اصلی') ||
                            el.classList.contains('skip-link') ||
                            el.classList.contains('screen-reader-text')) {
                          el.remove();
                        }
                      });
                    } catch(e) {}
                  });

                  // حذف عناصر غیرضروری
                  const removeSelectors = [
                    'script', 'style', 'iframe', 'noscript',
                    'nav', 'header', 'footer',
                    '.sidebar', '.menu', '.nav', '.navigation',
                    '.advertisement', '.ad', '.ads',
                    '.cookie-banner', '.cookie-consent', '.cookie-notice',
                    '.popup', '.modal', '.overlay',
                    '.social-share', '.social-links',
                    '.comments', '#comments',
                    '.related-posts', '.recommended',
                    '.search-form', '.search-box',
                    'form[role="search"]',
                    '#wpadminbar',
                    '.gdpr', '.cc-banner',
                    '.newsletter', '.subscription',
                    '.back-to-top', '.scroll-to-top',
                    '[aria-hidden="true"]'
                  ];
                  
                  removeSelectors.forEach(selector => {
                    try {
                      document.querySelectorAll(selector).forEach(el => el.remove());
                    } catch(e) {}
                  });
                });

                // تولید PDF
                const pdfBuffer = await page.pdf({
                  format: 'A4',
                  printBackground: true,
                  margin: { 
                    top: '20mm', 
                    bottom: '20mm', 
                    left: '15mm', 
                    right: '15mm' 
                  },
                  displayHeaderFooter: true,
                  headerTemplate: `
                    <div style="
                      font-size: 9px;
                      font-family: Arial, sans-serif;
                      text-align: center;
                      width: 100%;
                      padding: 8px;
                      color: #666;
                      border-bottom: 1px solid #eee;
                    ">
                      <span style="font-weight: bold;">${BASE_DOMAIN}</span> - ${new Date().toLocaleDateString('fa-IR')}
                    </div>
                  `,
                  footerTemplate: `
                    <div style="
                      font-size: 9px;
                      font-family: Arial, sans-serif;
                      text-align: center;
                      width: 100%;
                      padding: 8px;
                      color: #666;
                      border-top: 1px solid #eee;
                    ">
                      <span class="pageNumber"></span> / <span class="totalPages"></span>
                    </div>
                  `,
                  scale: 0.9
                });
                
                const pageTitle = await page.title() || url;
                pdfBuffers.push({ 
                  url, 
                  buffer: pdfBuffer,
                  title: pageTitle.substring(0, 100)
                });
                
                const sizeKB = (pdfBuffer.length / 1024).toFixed(1);
                console.log(`✅ ${sizeKB} KB | ${pageTitle}`.substring(0, 120));
                
                await page.close();
                page = null;

                // استخراج لینک‌ها برای عمق بیشتر
                if (depth < MAX_DEPTH && pagesToVisit.length < MAX_PAGES * 2) {
                  const explorePage = await browser.newPage();
                  try {
                    await explorePage.setRequestInterception(true);
                    explorePage.on('request', (req) => {
                      if (['image', 'stylesheet', 'font', 'media'].includes(req.resourceType())) {
                        req.abort();
                      } else {
                        req.continue();
                      }
                    });
                    
                    await explorePage.goto(url, { 
                      waitUntil: 'domcontentloaded', 
                      timeout: 15000 
                    });
                    
                    const links = await extractLinks(explorePage);
                    let addedLinks = 0;
                    
                    for (const link of links) {
                      const normalized = normalizeUrl(link, url);
                      if (normalized && !visited.has(normalized) && isContentPage(normalized)) {
                        const alreadyPlanned = pagesToVisit.some(p => p.url === normalized);
                        if (!alreadyPlanned) {
                          pagesToVisit.push({ url: normalized, depth: depth + 1 });
                          addedLinks++;
                        }
                      }
                    }
                    
                    if (addedLinks > 0) {
                      console.log(`🔗 +${addedLinks} لینک جدید (عمق ${depth + 1})`);
                    }
                  } catch (e) {
                    // خطا در استخراج لینک قابل چشم‌پوشی است
                  }
                  await explorePage.close();
                }
                
              } catch (error) {
                console.log(`❌ خطا: ${error.message.substring(0, 150)}`);
                if (page) {
                  try { await page.close(); } catch(e) {}
                }
              }
            }

            await browser.close();
            console.log(`\n${'='.repeat(50)}`);
            console.log(`📊 خلاصه:`);
            console.log(`   صفحات پردازش شده: ${pageCount}`);
            console.log(`   PDF‌های تولید شده: ${pdfBuffers.length}`);

            if (pdfBuffers.length === 0) {
              console.error('❌ هیچ صفحه‌ای دریافت نشد!');
              process.exit(1);
            }

            // ادغام PDFها
            console.log(`\n📚 در حال ادغام ${pdfBuffers.length} فایل PDF...`);
            const mergedPdf = await PDFDocument.create();
            let mergedCount = 0;

            for (const { url, buffer, title } of pdfBuffers) {
              try {
                const singlePdf = await PDFDocument.load(buffer);
                const copiedPages = await mergedPdf.copyPages(singlePdf, singlePdf.getPageIndices());
                copiedPages.forEach(page => mergedPdf.addPage(page));
                mergedCount++;
              } catch (error) {
                console.log(`⚠️ خطا در ادغام: ${url}`);
              }
            }

            if (mergedCount === 0) {
              console.error('❌ ادغام PDFها شکست خورد');
              process.exit(1);
            }

            // ذخیره فایل نهایی
            const pdfBytes = await mergedPdf.save();
            
            // ذخیره در ریشه ریپو
            fs.writeFileSync(OUTPUT_FILE, pdfBytes);
            
            const sizeMB = (pdfBytes.length / (1024 * 1024)).toFixed(2);
            console.log(`\n${'='.repeat(50)}`);
            console.log(`✅ فایل نهایی ذخیره شد`);
            console.log(`📁 ${OUTPUT_FILE}`);
            console.log(`📦 حجم: ${sizeMB} MB`);
            console.log(`📄 صفحات PDF: ${mergedPdf.getPageCount()}`);
            
          })().catch(err => {
            console.error('❌ خطای بحرانی:', err);
            process.exit(1);
          });
          SCRIPT_END

          echo "🚀 شروع آرشیو..."
          node archive.js

      - name: Commit PDF to Repository
        if: success()
        run: |
          FILENAME="${{ github.event.inputs.filename }}.pdf"
          
          echo "📋 بررسی فایل: $FILENAME"
          
          # بررسی وجود فایل
          if [ ! -f "$FILENAME" ]; then
            echo "❌ فایل PDF یافت نشد!"
            echo "📂 محتویات پوشه جاری:"
            ls -la
            exit 1
          fi
          
          echo "✅ فایل PDF پیدا شد"
          ls -lh "$FILENAME"
          
          # نمایش محتوای پوشه
          echo "📂 فایل‌های موجود:"
          ls -la
          
      - name: Push to Repository
        if: success()
        run: |
          FILENAME="${{ github.event.inputs.filename }}.pdf"
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          DOMAIN=$(echo "${{ github.event.inputs.target_url }}" | sed 's|https\?://||' | sed 's|/.*||')
          
          echo "🔄 آماده‌سازی برای commit و push..."
          
          # تنظیم git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # ایجاد شاخه جدید برای این آرشیو
          BRANCH_NAME="pdf-archive-${DOMAIN}-${TIMESTAMP}"
          
          # ایجاد و سوییچ به شاخه جدید
          git checkout -b "$BRANCH_NAME"
          
          # اضافه کردن فایل PDF
          git add "$FILENAME"
          
          # نمایش وضعیت
          echo "📊 وضعیت git:"
          git status
          
          # کامیت
          git commit -m "📚 آرشیو PDF: ${{ github.event.inputs.target_url }}" \
                     -m "🔍 عمق: ${{ github.event.inputs.depth }}" \
                     -m "📅 تاریخ: ${TIMESTAMP}" || {
            echo "⚠️ خطا در commit"
            git status
          }
          
          # Push به شاخه جدید
          echo "📤 در حال push به شاخه ${BRANCH_NAME}..."
          git push origin "$BRANCH_NAME"
          
          # ایجاد Pull Request (اختیاری)
          echo "🔗 لینک دانلود مستقیم:"
          echo "https://github.com/${{ github.repository }}/raw/${BRANCH_NAME}/${FILENAME}"
          
          # همچنین push به main
          echo "🔄 در حال merge با main..."
          git checkout main
          git pull origin main
          git merge "$BRANCH_NAME" --no-edit
          git push origin main
          
          echo "✅ فایل PDF با موفقیت در ریپو ذخیره شد!"
          echo ""
          echo "📥 لینک دانلود مستقیم:"
          echo "https://github.com/${{ github.repository }}/raw/main/${FILENAME}"
          
          # نمایش اطلاعات فایل
          echo ""
          echo "📊 اطلاعات فایل:"
          ls -lh "$FILENAME"
