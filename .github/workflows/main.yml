name: Website to PDF Archive

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'آدرس سایت (مثال: https://example.com)'
        required: true
        type: string
      depth:
        description: 'عمق دنبال کردن لینک‌ها (1 = فقط صفحه اصلی)'
        required: false
        type: choice
        options:
          - '1'
          - '2'
          - '3'
        default: '2'
      filename:
        description: 'نام فایل PDF خروجی'
        required: false
        type: string
        default: 'web-archive'

jobs:
  archive-to-pdf:
    name: Archive Website as PDF
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm init -y
          npm install puppeteer pdf-lib

      - name: Install Chromium Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            xdg-utils

      - name: Archive Website to PDF
        id: archive
        run: |
          cat > archive.js << 'SCRIPT_END'
          const puppeteer = require('puppeteer');
          const { PDFDocument } = require('pdf-lib');
          const fs = require('fs');
          const path = require('path');

          const TARGET_URL = process.env.TARGET_URL;
          const MAX_DEPTH = parseInt(process.env.DEPTH || '2');
          const OUTPUT_FILE = process.env.OUTPUT_FILE || 'web-archive.pdf';
          const BASE_DOMAIN = new URL(TARGET_URL).hostname;

          const visited = new Set();
          const pagesToVisit = [{ url: TARGET_URL, depth: 0 }];
          const pdfBuffers = [];

          // نرمال‌سازی URL
          function normalizeUrl(url, base) {
            try {
              const absolute = new URL(url, base);
              if (absolute.hostname !== BASE_DOMAIN) return null;
              absolute.hash = '';
              return absolute.href;
            } catch {
              return null;
            }
          }

          // استخراج لینک‌های داخلی
          async function extractLinks(page, baseUrl) {
            return await page.evaluate((baseDomain) => {
              const links = [];
              document.querySelectorAll('a[href]').forEach(a => {
                const href = a.getAttribute('href');
                if (href && !href.startsWith('#') && !href.startsWith('javascript:') && !href.startsWith('mailto:')) {
                  links.push(href);
                }
              });
              return links;
            }, BASE_DOMAIN);
          }

          console.log(`🚀 راه‌اندازی مرورگر...`);
          const browser = await puppeteer.launch({
            headless: 'new',
            args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
          });

          let pageIndex = 0;
          while (pagesToVisit.length > 0) {
            const { url, depth } = pagesToVisit.shift();
            
            if (visited.has(url)) continue;
            if (depth > MAX_DEPTH) continue;
            
            visited.add(url);
            pageIndex++;
            
            console.log(`${pageIndex}. 📄 دریافت: ${url}`);
            
            try {
              const page = await browser.newPage();
              await page.setViewport({ width: 1280, height: 800 });
              await page.setUserAgent('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36');
              
              await page.goto(url, { 
                waitUntil: 'networkidle2', 
                timeout: 30000 
              });
              
              // حذف المان‌های مزاحم
              await page.evaluate(() => {
                const selectors = [
                  'script', 'style', 'nav[role="navigation"]',
                  '.sidebar', '.nav', '.menu', '.advertisement',
                  '.cookie-banner', '.popup', '.modal'
                ];
                selectors.forEach(sel => {
                  document.querySelectorAll(sel).forEach(el => el.remove());
                });
              });

              // تولید PDF
              const pdfBuffer = await page.pdf({
                format: 'A4',
                printBackground: true,
                margin: { top: '20mm', bottom: '20mm', left: '15mm', right: '15mm' },
                displayHeaderFooter: true,
                headerTemplate: `<div style="font-size:10px; text-align:center; width:100%;">${url}</div>`,
                footerTemplate: `<div style="font-size:10px; text-align:center; width:100%;">صفحه <span class="pageNumber"></span> از <span class="totalPages"></span></div>`
              });
              
              pdfBuffers.push({ url, buffer: pdfBuffer });
              await page.close();
              
              // استخراج لینک‌ها برای رفتن عمیق‌تر
              if (depth < MAX_DEPTH) {
                const explorePage = await browser.newPage();
                await explorePage.goto(url, { waitUntil: 'domcontentloaded', timeout: 15000 });
                const links = await extractLinks(explorePage, url);
                await explorePage.close();
                
                for (const link of links) {
                  const normalized = normalizeUrl(link, url);
                  if (normalized && !visited.has(normalized)) {
                    const alreadyPlanned = pagesToVisit.some(p => p.url === normalized);
                    if (!alreadyPlanned) {
                      pagesToVisit.push({ url: normalized, depth: depth + 1 });
                    }
                  }
                }
              }
              
            } catch (error) {
              console.log(`⚠️ خطا در دریافت ${url}: ${error.message}`);
            }
          }

          await browser.close();

          // ادغام PDFها
          console.log(`\n📚 ادغام ${pdfBuffers.length} صفحه در یک فایل PDF...`);
          const mergedPdf = await PDFDocument.create();

          for (const { url, buffer } of pdfBuffers) {
            try {
              const singlePdf = await PDFDocument.load(buffer);
              const pages = await mergedPdf.copyPages(singlePdf, singlePdf.getPageIndices());
              
              // اضافه کردن صفحه فهرست
              if (pdfBuffers.indexOf({url, buffer}) === 0 || true) {
                pages.forEach(page => mergedPdf.addPage(page));
              }
            } catch (error) {
              console.log(`⚠️ خطا در اضافه کردن ${url} به PDF نهایی`);
            }
          }

          // اضافه کردن بوکمارک
          const pdfBytes = await mergedPdf.save();
          fs.writeFileSync(OUTPUT_FILE, pdfBytes);
          
          const sizeMB = (pdfBytes.length / (1024 * 1024)).toFixed(2);
          console.log(`\n✅ آرشیو کامل شد: ${OUTPUT_FILE} (${sizeMB} MB)`);
          console.log(`📊 مجموع صفحات آرشیو شده: ${visited.size}`);
          SCRIPT_END

          node archive.js
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
          DEPTH: ${{ github.event.inputs.depth }}
          OUTPUT_FILE: ${{ github.event.inputs.filename }}.pdf

      - name: Upload PDF as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-pdf-archive
          path: ${{ github.event.inputs.filename }}.pdf
          retention-days: 90

      - name: Commit PDF to Repository
        run: |
          FILENAME="${{ github.event.inputs.filename }}.pdf"
          
          if [ -f "$FILENAME" ]; then
            cp "$FILENAME" archives/
            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com"
            git add archives/
            git commit -m "📚 آرشیو PDF: ${{ github.event.inputs.target_url }}"
            git pull --rebase origin main
            git push origin main
            
            echo "📂 فایل در مسیر archives/$FILENAME ذخیره شد"
          else
            echo "❌ فایل PDF ایجاد نشد"
            exit 1
          fi
